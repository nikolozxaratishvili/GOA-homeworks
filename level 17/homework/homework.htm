<html>
<head>
    <title>registration page</title>
</head>
<body>

<h2>მომხმარებლის რეგისტრაცია</h2>

    <label for="name">სახელი:</label><br>
    <input type="text" id="name" name="name" placeholder="შეიყვანეთ სახელი"><br>

    <label for="surname">გვარი:</label><br>
    <input type="text" id="surname" name="surname" placeholder="შეიყვანეთ გვარი"><br>

    <label for="email">ელ-ფოსტა:</label><br>
    <input type="email" id="email" name="email" placeholder="example@gmail.com"><br>

    <label for="password">პაროლი:</label><br>
    <input type="password" id="password" name="password" placeholder="შეიყვანეთ პაროლი"><br>

    <label for="age">ასაკი:</label><br>
    <input type="number" id="age" name="age" placeholder="შეიყვანეთ ასაკი"><br>

    <input type="submit" value="გაგზავნა">

</body>
</html>
